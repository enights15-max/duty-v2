<svg width="1680" height="1120" viewBox="0 0 1680 1120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="40" x2="1540" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A1030"/>
      <stop offset="0.52" stop-color="#110B1C"/>
      <stop offset="1" stop-color="#09161A"/>
    </linearGradient>
    <linearGradient id="window" x1="0" y1="0" x2="0" y2="760">
      <stop stop-color="#1A1628"/>
      <stop offset="1" stop-color="#0E0B16"/>
    </linearGradient>
    <linearGradient id="panelGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B081FF" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#6424F1" stop-opacity="0.28"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#32214D"/>
      <stop offset="1" stop-color="#161223"/>
    </linearGradient>
    <linearGradient id="buyPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1B2032"/>
      <stop offset="1" stop-color="#11131D"/>
    </linearGradient>
    <filter id="shadow" x="-120" y="-120" width="1920" height="1440" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="36"/>
    </filter>
    <style>
      .display { font-family: Arial, sans-serif; font-weight: 700; }
      .body { font-family: Arial, sans-serif; font-weight: 500; }
      .label { font-family: Arial, sans-serif; font-weight: 600; letter-spacing: 1.4px; }
    </style>
  </defs>

  <rect width="1680" height="1120" fill="url(#bg)"/>
  <circle cx="220" cy="150" r="180" fill="#8C25F4" fill-opacity="0.22" filter="url(#glow)"/>
  <circle cx="1500" cy="220" r="220" fill="#8655F6" fill-opacity="0.14" filter="url(#glow)"/>
  <circle cx="1460" cy="920" r="240" fill="#16D6C2" fill-opacity="0.09" filter="url(#glow)"/>

  <text x="90" y="96" fill="#D9D3F1" font-size="18" class="label">WEB PROPOSAL / APP ALIGNED VISUAL SYSTEM</text>
  <text x="90" y="146" fill="#FFFFFF" font-size="56" class="display">Una web con el mismo ADN</text>
  <text x="90" y="204" fill="#B589FF" font-size="56" class="display">de la app actual</text>
  <text x="90" y="254" fill="#9FA8C6" font-size="22" class="body">Oscuro editorial, glass surfaces, acento violeta, social proof fuerte y una jerarquia mas limpia para desktop.</text>

  <!-- Panel 1: Home -->
  <g filter="url(#shadow)">
    <rect x="72" y="326" width="492" height="694" rx="34" fill="url(#window)"/>
  </g>
  <rect x="92" y="350" width="452" height="42" rx="18" fill="#11101A" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <circle cx="118" cy="371" r="5.5" fill="#FF5F57"/>
  <circle cx="138" cy="371" r="5.5" fill="#FEBB2E"/>
  <circle cx="158" cy="371" r="5.5" fill="#28C840"/>
  <text x="178" y="377" fill="#7983A5" font-size="12" class="body">duty web / home discovery</text>

  <text x="104" y="432" fill="#FFFFFF" font-size="15" class="label">WEB HOME</text>
  <text x="104" y="470" fill="#FFFFFF" font-size="34" class="display">Desktop discovery with</text>
  <text x="104" y="508" fill="#B589FF" font-size="34" class="display">the same social energy</text>

  <rect x="104" y="542" width="204" height="34" rx="17" fill="#1D1930"/>
  <text x="124" y="564" fill="#FFFFFF" font-size="13" class="body">Your Scene / live social module</text>

  <rect x="104" y="596" width="420" height="174" rx="28" fill="url(#hero)" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <rect x="126" y="620" width="156" height="28" rx="14" fill="#231A3B"/>
  <text x="145" y="638" fill="#C8B5FF" font-size="11" class="label">YOUR SCENE</text>
  <text x="126" y="684" fill="#FFFFFF" font-size="28" class="display">What your people</text>
  <text x="126" y="716" fill="#FFFFFF" font-size="28" class="display">are planning tonight</text>
  <text x="126" y="748" fill="#A9B2CF" font-size="14" class="body">Feed social arriba, motivo visible, CTA corto hacia la red.</text>
  <rect x="392" y="618" width="112" height="34" rx="17" fill="#2A2043"/>
  <text x="414" y="640" fill="#FFFFFF" font-size="13" class="body">My Network</text>

  <rect x="104" y="792" width="132" height="88" rx="22" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="126" y="830" fill="#FFFFFF" font-size="22" class="display">Home</text>
  <text x="126" y="852" fill="#8F9AB8" font-size="12" class="body">hero + social cues</text>
  <rect x="248" y="792" width="132" height="88" rx="22" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="270" y="830" fill="#FFFFFF" font-size="22" class="display">Search</text>
  <text x="270" y="852" fill="#8F9AB8" font-size="12" class="body">proof on results</text>
  <rect x="392" y="792" width="132" height="88" rx="22" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="414" y="830" fill="#FFFFFF" font-size="22" class="display">Profile</text>
  <text x="414" y="852" fill="#8F9AB8" font-size="12" class="body">network access</text>

  <rect x="104" y="900" width="420" height="90" rx="24" fill="#13111E" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="126" y="930" fill="#B589FF" font-size="11" class="label">DIRECTRICES</text>
  <text x="126" y="958" fill="#FFFFFF" font-size="15" class="body">Top nav ligera, hero editorial, paneles grandes y discovery cards con señales sociales visibles.</text>

  <!-- Panel 2: Event detail -->
  <g filter="url(#shadow)">
    <rect x="594" y="286" width="492" height="734" rx="34" fill="url(#window)"/>
  </g>
  <rect x="614" y="310" width="452" height="42" rx="18" fill="#11101A" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <circle cx="640" cy="331" r="5.5" fill="#FF5F57"/>
  <circle cx="660" cy="331" r="5.5" fill="#FEBB2E"/>
  <circle cx="680" cy="331" r="5.5" fill="#28C840"/>
  <text x="700" y="337" fill="#7983A5" font-size="12" class="body">duty web / event details</text>

  <text x="626" y="390" fill="#FFFFFF" font-size="15" class="label">EVENT DETAIL</text>
  <text x="626" y="428" fill="#FFFFFF" font-size="34" class="display">Same premium card language,</text>
  <text x="626" y="466" fill="#B589FF" font-size="34" class="display">but adapted to desktop layout</text>

  <rect x="626" y="502" width="266" height="314" rx="28" fill="#1A1626" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <rect x="646" y="522" width="226" height="168" rx="22" fill="#2A2238"/>
  <text x="648" y="730" fill="#FFFFFF" font-size="28" class="display">WHO ARE YOU</text>
  <text x="648" y="758" fill="#AAB4D0" font-size="14" class="body">Hero visual grande, badges de estado y crowd proof integrados.</text>

  <rect x="910" y="502" width="156" height="314" rx="28" fill="url(#buyPanel)" stroke="#FFFFFF" stroke-opacity="0.06"/>
  <text x="932" y="536" fill="#FFFFFF" font-size="16" class="label">BUY PANEL</text>
  <text x="932" y="586" fill="#FFFFFF" font-size="44" class="display">$600</text>
  <text x="932" y="610" fill="#AAB4D0" font-size="13" class="body">Card payment with Stripe</text>
  <rect x="932" y="642" width="112" height="30" rx="15" fill="#1E1730"/>
  <text x="948" y="661" fill="#FFFFFF" font-size="12" class="body">12 interested</text>
  <rect x="932" y="682" width="122" height="30" rx="15" fill="#1E1730"/>
  <text x="948" y="701" fill="#FFFFFF" font-size="12" class="body">3 in your network</text>
  <rect x="932" y="744" width="112" height="42" rx="18" fill="#8C25F4"/>
  <text x="958" y="770" fill="#FFFFFF" font-size="14" class="body">Buy Tickets</text>

  <rect x="626" y="842" width="440" height="148" rx="26" fill="#13111E" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="648" y="872" fill="#B589FF" font-size="11" class="label">KEY TRANSLATION FROM APP TO WEB</text>
  <text x="648" y="906" fill="#FFFFFF" font-size="15" class="body">El CTA compacto del app se convierte en columna derecha fija. El crowd proof y las razones sociales se mantienen cerca del precio, no enterradas debajo.</text>
  <text x="648" y="940" fill="#AAB4D0" font-size="14" class="body">La ficha principal sigue respirando como en mobile: poster dominante, overlays suaves y tipografia marcada.</text>

  <!-- Panel 3: Account center / social -->
  <g filter="url(#shadow)">
    <rect x="1116" y="326" width="492" height="694" rx="34" fill="url(#window)"/>
  </g>
  <rect x="1136" y="350" width="452" height="42" rx="18" fill="#11101A" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <circle cx="1162" cy="371" r="5.5" fill="#FF5F57"/>
  <circle cx="1182" cy="371" r="5.5" fill="#FEBB2E"/>
  <circle cx="1202" cy="371" r="5.5" fill="#28C840"/>
  <text x="1222" y="377" fill="#7983A5" font-size="12" class="body">duty web / account center</text>

  <text x="1148" y="432" fill="#FFFFFF" font-size="15" class="label">ACCOUNT CENTER / NETWORK</text>
  <text x="1148" y="470" fill="#FFFFFF" font-size="34" class="display">One visual system for</text>
  <text x="1148" y="508" fill="#B589FF" font-size="34" class="display">identities and social graph</text>

  <rect x="1148" y="548" width="420" height="128" rx="26" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="1172" y="582" fill="#FFFFFF" font-size="24" class="display">Personal</text>
  <text x="1172" y="608" fill="#AAB4D0" font-size="14" class="body">wallet, loyalty, tickets, bookings, privacy</text>
  <rect x="1426" y="570" width="118" height="34" rx="17" fill="#251C3D"/>
  <text x="1450" y="592" fill="#C8B5FF" font-size="12" class="body">Active mode</text>

  <rect x="1148" y="694" width="202" height="122" rx="24" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="1170" y="730" fill="#FFFFFF" font-size="22" class="display">Organizer</text>
  <text x="1170" y="756" fill="#8F9AB8" font-size="13" class="body">events, tickets, bookings</text>
  <rect x="1366" y="694" width="202" height="122" rx="24" fill="#151223" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="1388" y="730" fill="#FFFFFF" font-size="22" class="display">Artist</text>
  <text x="1388" y="756" fill="#8F9AB8" font-size="13" class="body">profile, reviews, tips</text>

  <rect x="1148" y="834" width="420" height="156" rx="26" fill="#13111E" stroke="#FFFFFF" stroke-opacity="0.05"/>
  <text x="1170" y="866" fill="#B589FF" font-size="11" class="label">NETWORK PANEL</text>
  <text x="1170" y="900" fill="#FFFFFF" font-size="16" class="body">Followers, Following y Requests usan las mismas cards del mobile, pero con mas aire, conteos visibles y CTA rapidos.</text>
  <rect x="1170" y="928" width="94" height="32" rx="16" fill="#1E1730"/>
  <text x="1194" y="949" fill="#FFFFFF" font-size="12" class="body">18 followers</text>
  <rect x="1274" y="928" width="92" height="32" rx="16" fill="#1E1730"/>
  <text x="1298" y="949" fill="#FFFFFF" font-size="12" class="body">27 following</text>
  <rect x="1376" y="928" width="88" height="32" rx="16" fill="#2B2010"/>
  <text x="1400" y="949" fill="#FFD988" font-size="12" class="body">3 requests</text>

  <!-- Footer design tokens -->
  <rect x="88" y="1052" width="1504" height="2" fill="#1E1930"/>
  <text x="90" y="1088" fill="#B589FF" font-size="11" class="label">DESIGN TOKENS</text>
  <text x="230" y="1088" fill="#FFFFFF" font-size="14" class="body">Primary #8C25F4 / Surfaces #2D1F3D / Background #191022 / Typography mix: Outfit + Spline Sans + Manrope / Rounded glass cards / social cues as first-class UI.</text>
</svg>
