<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F0D13"/>
      <stop offset="1" stop-color="#17131B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#221A21"/>
      <stop offset="1" stop-color="#19161D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C1121F"/>
      <stop offset="1" stop-color="#8A0F18"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px Georgia, serif; fill: #F7F1EB; }
      .subtitle { font: 400 17px Arial, sans-serif; fill: #CDBFC5; }
      .card-title { font: 700 22px Arial, sans-serif; fill: #FFF8F5; }
      .card-copy { font: 400 16px Arial, sans-serif; fill: #D9CDD2; }
      .tag { font: 700 13px Arial, sans-serif; fill: #FFD8DD; letter-spacing: 1.4px; }
      .small { font: 400 14px Arial, sans-serif; fill: #BDAFB6; }
      .mini { font: 700 13px Arial, sans-serif; fill: #F2E7E9; }
      .arrow { stroke: #D4A63C; stroke-width: 3; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>
  <rect x="48" y="42" width="1504" height="1016" rx="28" fill="rgba(255,255,255,0.02)" stroke="#2A2430"/>

  <text x="84" y="104" class="title">Duty Next Modules</text>
  <text x="84" y="134" class="subtitle">Rewards operativos, sponsors, collaboration y event details estructurado</text>

  <g filter="url(#shadow)">
    <rect x="84" y="190" width="680" height="260" rx="28" fill="url(#card)" stroke="#362C34"/>
    <rect x="84" y="190" width="680" height="10" rx="5" fill="url(#accent)"/>
    <text x="116" y="232" class="tag">BLOCK 1</text>
    <text x="116" y="272" class="card-title">Ticket Rewards / Welcome Drink QR</text>
    <text x="116" y="310" class="card-copy">Organizer define benefit por ticket.</text>
    <text x="116" y="338" class="card-copy">Compra genera instancia reservada.</text>
    <text x="116" y="366" class="card-copy">Scan de boleta activa reward.</text>
    <text x="116" y="394" class="card-copy">Bartender escanea QR y despacha.</text>
    <text x="116" y="426" class="small">Algoritmo clave: reserved -&gt; activated -&gt; claimed con validacion por station y anti-duplicado.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="836" y="190" width="680" height="260" rx="28" fill="url(#card)" stroke="#362C34"/>
    <rect x="836" y="190" width="680" height="10" rx="5" fill="url(#accent)"/>
    <text x="868" y="232" class="tag">BLOCK 2</text>
    <text x="868" y="272" class="card-title">Sponsors Catalog + Event Sponsors</text>
    <text x="868" y="310" class="card-copy">Admin crea sponsor y sube logo.</text>
    <text x="868" y="338" class="card-copy">Organizer selecciona sponsors en el evento.</text>
    <text x="868" y="366" class="card-copy">Event details muestra logos y placements.</text>
    <text x="868" y="394" class="card-copy">Admin obtiene stats por sponsor.</text>
    <text x="868" y="426" class="small">Sinergia futura: reward patrocinado, claims por sponsor, revenue influence.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="502" width="680" height="260" rx="28" fill="url(#card)" stroke="#362C34"/>
    <rect x="84" y="502" width="680" height="10" rx="5" fill="url(#accent)"/>
    <text x="116" y="544" class="tag">BLOCK 3</text>
    <text x="116" y="584" class="card-title">Promoter / Co-organizer Collaboration</text>
    <text x="116" y="622" class="card-copy">Nuevo actor profesional para colaboracion.</text>
    <text x="116" y="650" class="card-copy">Organizer define % por artista, promotor o co-organizer.</text>
    <text x="116" y="678" class="card-copy">Treasury reparte shares con reconciliacion auditable.</text>
    <text x="116" y="710" class="small">Decision clave: promoter como identity real, no solo etiqueta de split.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="836" y="502" width="680" height="260" rx="28" fill="url(#card)" stroke="#362C34"/>
    <rect x="836" y="502" width="680" height="10" rx="5" fill="url(#accent)"/>
    <text x="868" y="544" class="tag">BLOCK 4</text>
    <text x="868" y="584" class="card-title">Structured Event Details</text>
    <text x="868" y="622" class="card-copy">Menos texto manual, mas informacion estructurada.</text>
    <text x="868" y="650" class="card-copy">Lineup, perks, sponsors, collaborators, policies.</text>
    <text x="868" y="678" class="card-copy">Descripcion manual pasa a fallback tecnico.</text>
    <text x="868" y="710" class="small">Esto funciona mejor cuando rewards, sponsors y collaboration ya existen.</text>
  </g>

  <path d="M764 320 C800 320, 800 320, 836 320" class="arrow"/>
  <path d="M424 450 C424 480, 424 480, 424 502" class="arrow"/>
  <path d="M1176 450 C1176 480, 1176 480, 1176 502" class="arrow"/>
  <path d="M764 632 C800 632, 800 632, 836 632" class="arrow"/>

  <g filter="url(#shadow)">
    <rect x="84" y="834" width="1432" height="180" rx="28" fill="#15121A" stroke="#362C34"/>
    <text x="116" y="878" class="tag">EXECUTION ORDER</text>
    <text x="116" y="920" class="card-title">1. Ticket Rewards  2. Sponsors  3. Promoter Collaboration  4. Structured Event Details</text>
    <text x="116" y="958" class="card-copy">En modo intensivo de 12h/dia: 24 dias utiles bien enfocados. La recomendacion real es trabajar con checkpoints para evitar errores por fatiga.</text>
    <text x="116" y="990" class="small">Foundation reused: rewards fulfillment existente, treasury/collaborator economy, event authoring, scanner flows, admin analytics.</text>
  </g>
</svg>
