  <text x="1100" y="915" fill="#16121A" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Use it like this</text>
  <text x="1100" y="960" fill="#5D5564" font-family="Arial" font-size="24">• Brand scarlet for CTA, active tabs, focus and identity.</text>
  <text x="1100" y="1000" fill="#5D5564" font-family="Arial" font-size="24">• Keep error red separate from the brand red.</text>
  <text x="1100" y="1040" fill="#5D5564" font-family="Arial" font-size="24">• Consumer app: dark-first.</text>
  <text x="1100" y="1080" fill="#5D5564" font-family="Arial" font-size="24">• Admin and professional web: light-first.</text>
  <text x="1100" y="1120" fill="#5D5564" font-family="Arial" font-size="24">• Use warm gold only for premium payout moments.</text>
</svg>
