  <text x="120" y="890" fill="#16121A" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Semantic States</text>
  <g transform="translate(120 925)">
    <rect width="220" height="120" rx="20" fill="#238A57"/>
    <text x="20" y="42" fill="#F3FFF7" font-family="Arial" font-size="24" font-weight="700">Success</text>
    <text x="20" y="78" fill="#D7F4E3" font-family="Arial" font-size="22">#238A57</text>
  </g>
  <g transform="translate(360 925)">
    <rect width="220" height="120" rx="20" fill="#C68500"/>
    <text x="20" y="42" fill="#FFF9E9" font-family="Arial" font-size="24" font-weight="700">Warning</text>
    <text x="20" y="78" fill="#FFE6A8" font-family="Arial" font-size="22">#C68500</text>
  </g>
  <g transform="translate(600 925)">
    <rect width="220" height="120" rx="20" fill="#D32F2F"/>
    <text x="20" y="42" fill="#FFF2F2" font-family="Arial" font-size="24" font-weight="700">Danger</text>
    <text x="20" y="78" fill="#FFD3D3" font-family="Arial" font-size="22">#D32F2F</text>
  </g>
  <g transform="translate(840 925)">
    <rect width="220" height="120" rx="20" fill="#4459E6"/>
    <text x="20" y="42" fill="#F5F7FF" font-family="Arial" font-size="24" font-weight="700">Info</text>
    <text x="20" y="78" fill="#DCE1FF" font-family="Arial" font-size="22">#4459E6</text>
