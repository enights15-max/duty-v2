  <rect x="1088" y="1036" width="108" height="86" rx="18" fill="#B21E35"/><text x="1088" y="1148" class="tiny">Accent</text><text x="1088" y="1176" class="hex">#B21E35</text>
  <rect x="1212" y="1036" width="108" height="86" rx="18" fill="#111015"/><text x="1212" y="1148" class="tiny">Noir</text><text x="1212" y="1176" class="hex">#111015</text>
  <rect x="1336" y="1036" width="108" height="86" rx="18" fill="#23212A"/><text x="1336" y="1148" class="tiny">Stone</text><text x="1336" y="1176" class="hex">#23212A</text>
  <rect x="1460" y="1036" width="108" height="86" rx="18" fill="#908A98"/><text x="1460" y="1148" class="tiny">Smoke</text><text x="1460" y="1176" class="hex">#908A98</text>
