<svg width="1800" height="1400" viewBox="0 0 1800 1400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1800" y2="1400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0910"/>
      <stop offset="1" stop-color="#14111A"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2000" height="1600" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title{font:700 64px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#F5F1EB}
      .sub{font:400 28px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#A7A3B3}
      .cardTitle{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#F5F1EB}
      .cardSub{font:400 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#A7A3B3}
      .small{font:600 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#F5F1EB}
      .tiny{font:500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#D0CAD8}
      .hex{font:400 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#8E8898}
      .foot{font:500 20px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; fill:#C9C3CF}
