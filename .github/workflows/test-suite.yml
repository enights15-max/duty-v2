name: Test Suite

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, curl, bcmath, gd
          coverage: none

      - name: Validate composer files
        run: composer validate --no-check-publish

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run full test suite
        run: |
          mkdir -p test-results
          php artisan test \
            --stop-on-failure \
            --log-junit=test-results/full-suite-junit.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-suite-junit
          path: test-results/full-suite-junit.xml
          if-no-files-found: warn

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## Test Suite"
            echo ""
            echo "- Suite: Unit + Feature (completo)"
            echo "- PHP: 8.3 / SQLite in-memory"
            echo "- Report: \`test-results/full-suite-junit.xml\`"
          } >> "$GITHUB_STEP_SUMMARY"
