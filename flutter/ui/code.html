<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Secure Unified Login - DUTY</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8c25f4",
                        "electric-violet": "#8c25f4",
                        "soft-charcoal": "#2d2d2d",
                        "background-light": "#f7f5f8",
                        "background-dark": "#050505",
                    },
                    fontFamily: {
                        "display": ["Spline Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background-dark text-slate-100 font-display min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden;
            }
        }
        .minimal-input {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: none;
            border-bottom: 1px solid #2d2d2d;
            border-radius: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .minimal-input:focus {
            outline: none;
            border-bottom-color: #8c25f4;
            box-shadow: 0 4px 12px -4px rgba(140, 37, 244, 0.3);
            background: rgba(140, 37, 244, 0.02);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 100, 'GRAD' 0, 'opsz' 20;
        }
        .social-tile {
            background: #0f0f0f;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }
        .social-tile:active {
            transform: scale(0.96);
            border-color: rgba(140, 37, 244, 0.4);
        }
        .bg-mesh {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: radial-gradient(circle at 70% 30%, rgba(140, 37, 244, 0.12) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(140, 37, 244, 0.08) 0%, transparent 40%);
        }
        .face-id-glow {
            box-shadow: 0 0 35px rgba(140, 37, 244, 0.25);
        }
        ::placeholder {
            font-weight: 300;
            letter-spacing: 0.025em;
            color: #4b5563 !important;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body>
<div class="bg-mesh"></div>
<main class="w-full max-w-[400px] flex flex-col space-y-10">
<header class="space-y-3 mt-4">
<div class="flex items-center space-x-2 opacity-60">
<span class="material-symbols-outlined text-[18px] text-electric-violet">verified_user</span>
<span class="text-[10px] font-semibold tracking-[0.2em] uppercase text-slate-300">Premium Authentication</span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-white">Welcome Back</h1>
<p class="text-slate-500 font-light text-sm">Access your unified financial ecosystem.</p>
</header>
<section class="flex flex-col items-center py-4 space-y-4">
<button class="w-20 h-20 bg-primary/10 border border-primary/20 rounded-3xl flex items-center justify-center face-id-glow transition-transform active:scale-95">
<span class="material-symbols-outlined text-white text-4xl">face</span>
</button>
<div class="text-center">
<p class="text-[13px] font-medium text-slate-300 tracking-wide">Fast Login</p>
<p class="text-[11px] text-slate-600">Biometrics enabled</p>
</div>
</section>
<div class="space-y-8">
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-slate-600 text-[20px] group-focus-within:text-electric-violet transition-colors duration-500">mail</span>
<input class="w-full h-12 pl-8 pr-4 minimal-input text-white text-sm font-light placeholder:text-slate-600" placeholder="Email Address" type="email"/>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-slate-600 text-[20px] group-focus-within:text-electric-violet transition-colors duration-500">lock</span>
<input class="w-full h-12 pl-8 pr-10 minimal-input text-white text-sm font-light placeholder:text-slate-600" placeholder="Security Password" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-slate-600 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[18px]">visibility_off</span>
</button>
</div>
<div class="flex justify-between items-center pt-2">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="w-4 h-4 rounded border-slate-800 bg-transparent text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-xs text-slate-500 font-light">Keep me signed in</span>
</label>
<a class="text-xs text-primary/70 hover:text-primary transition-colors font-medium tracking-wide" href="#">Forgot Password?</a>
</div>
<button class="w-full h-14 bg-white text-black rounded-full font-semibold text-sm hover:bg-slate-200 active:scale-[0.98] transition-all shadow-lg shadow-white/5">
                Sign In
            </button>
</div>
<div class="flex items-center space-x-4">
<div class="h-[1px] flex-1 bg-white/5"></div>
<span class="text-[9px] uppercase tracking-[0.25em] text-slate-600 font-medium">Alternative access</span>
<div class="h-[1px] flex-1 bg-white/5"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="h-14 rounded-2xl social-tile flex items-center justify-center space-x-3">
<svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.88-3.12 1.87-2.38 5.98.67 7.13-.53 1.54-1.34 3.03-2.67 4zM12.03 7.25c-.13-2.23 1.74-4.07 3.91-4.25.25 2.18-2.12 4.1-3.91 4.25z"></path>
</svg>
<span class="text-[13px] font-medium text-white">Apple</span>
</button>
<button class="h-14 rounded-2xl social-tile flex items-center justify-center space-x-3">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.22-3.22C17.52 1.64 14.95 0 12 0 7.31 0 3.25 2.69 1.24 6.64l3.8 2.95C5.93 6.94 8.75 5.04 12 5.04z" fill="#EA4335"></path>
<path d="M23.64 12.2c0-.85-.07-1.68-.21-2.48H12v4.7h6.52c-.28 1.5-.1.8-1.5 2.76l3.8 2.95c2.22-2.05 3.5-5.07 3.5-8.47z" fill="#FBBC05"></path>
<path d="M12 24c3.24 0 5.97-1.07 7.96-2.91l-3.8-2.95c-1.1.74-2.5 1.17-4.16 1.17-3.2 0-5.91-2.16-6.88-5.08l-3.8 2.95C3.33 21.2 7.39 24 12 24z" fill="#4285F4"></path>
<path d="M5.12 14.23c-.25-.74-.39-1.53-.39-2.35s.14-1.61.39-2.35L1.32 6.58C.48 8.24 0 10.07 0 12s.48 3.76 1.32 5.42l3.8-3.19z" fill="#34A853"></path>
</svg>
<span class="text-[13px] font-medium text-white">Google</span>
</button>
</div>
<footer class="text-center pt-4">
<p class="text-xs text-slate-500 font-light">
                New to the platform? 
                <a class="text-white font-semibold hover:text-electric-violet transition-colors ml-1" href="#">Create Account</a>
</p>
</footer>
</main>
<div class="fixed top-1/3 -right-24 w-80 h-80 bg-electric-violet/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/3 -left-24 w-80 h-80 bg-electric-violet/5 rounded-full blur-[100px] pointer-events-none"></div>

</body></html>
